name: PR

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      website: ${{ steps.filter.outputs.website }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'lib/**'
              - 'bin/**'
              - 'package*.json'
              - 'tsconfig.json'
              - 'cdk.json'
            website:
              - 'website/**'

  lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Lint and typecheck backend
        if: needs.changes.outputs.backend == 'true'
        run: npm ci && npm run lint && npx tsc --noEmit
      - name: Lint and typecheck website
        if: needs.changes.outputs.website == 'true'
        working-directory: website
        run: npm ci && npm run lint && npm run typecheck

  deploy:
    needs: [changes, lint]
    if: |
      always() &&
      needs.lint.result != 'failure' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.website == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Build website
        working-directory: website
        env:
          VITE_BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
        run: npm ci && npm run build
      - name: Deploy
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
        run: npm run deploy -- key-coord --context envSuffix=dev --require-approval never

  test:
    needs: [changes, deploy]
    if: |
      always() &&
      needs.deploy.result != 'failure' &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.website == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: echo "No tests yet"
