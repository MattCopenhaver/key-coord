name: Deploy to prod

on:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      website: ${{ steps.filter.outputs.website }}
      addon: ${{ steps.filter.outputs.addon }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'lib/**'
              - 'bin/**'
              - 'package*.json'
              - 'tsconfig.json'
              - 'cdk.json'
            website:
              - 'website/**'
            addon:
              - 'wow-addon/**'

  deploy:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Build website
        working-directory: website
        env:
          VITE_BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
        run: npm ci && npm run build
      - name: Deploy
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
        run: npm run deploy -- key-coord --context envSuffix=prod --require-approval never

  deploy-addon:
    needs: changes
    if: needs.changes.outputs.addon == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from TOC
        id: toc
        run: |
          VERSION=$(grep "^## Version:" wow-addon/KeyCoord/KeyCoord.toc | sed 's/## Version: *//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          INTERFACE=$(grep "^## Interface:" wow-addon/KeyCoord/KeyCoord.toc | sed 's/## Interface: *//')
          MAJOR=$((INTERFACE / 10000))
          MINOR=$(( (INTERFACE % 10000) / 100 ))
          PATCH=$((INTERFACE % 100))
          echo "gameVersion=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Package addon
        run: |
          cd wow-addon
          zip -r ../KeyCoord-${{ steps.toc.outputs.version }}.zip KeyCoord/ -x "**/__MACOSX/*" -x "**/.DS_Store"

      - name: Get CurseForge game version ID
        id: cfver
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          GAME_VERSION: ${{ steps.toc.outputs.gameVersion }}
        run: |
          VERSION_ID=$(curl -s --fail-with-body -H "X-Api-Token: $CURSEFORGE_TOKEN" \
            "https://wow.curseforge.com/api/game/versions" | \
            jq --arg v "$GAME_VERSION" '[.[] | select(.gameVersionTypeID == 517 and .name == $v)] | first | .id')
          echo "id=$VERSION_ID" >> $GITHUB_OUTPUT

      - name: Upload to CurseForge
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          VERSION: ${{ steps.toc.outputs.version }}
          GAME_VERSION_ID: ${{ steps.cfver.outputs.id }}
        run: |
          METADATA=$(printf '{"gameVersions":[%s],"displayName":"%s","releaseType":"release","changelog":"","changelogType":"text"}' \
            "$GAME_VERSION_ID" "$VERSION")
          echo "Uploading KeyCoord-${VERSION}.zip with metadata: $METADATA"
          HTTP_CODE=$(curl -s -o /tmp/cf_response.json -w "%{http_code}" -X POST \
            -H "X-Api-Token: $CURSEFORGE_TOKEN" \
            -F "metadata=$METADATA" \
            -F "file=@KeyCoord-${VERSION}.zip" \
            "https://wow.curseforge.com/api/projects/$PROJECT_ID/upload-file")
          RESPONSE=$(cat /tmp/cf_response.json)
          echo "Response (HTTP $HTTP_CODE): $RESPONSE"
          if echo "$RESPONSE" | jq -e '.id' > /dev/null 2>&1; then
            echo "Upload successful (file ID: $(echo "$RESPONSE" | jq '.id'))"
          else
            echo "Upload failed: $(echo "$RESPONSE" | jq -r '.errorMessage // "unknown error"')"
            exit 1
          fi
